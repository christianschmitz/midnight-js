version: 2

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

#  - package-ecosystem: "cargo"
#    directory: "/"
#    registries: "*"
#    schedule:
#      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/"
    registries:
      - npm-github
    schedule:
      interval: "daily"

