name: CI
env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      build_shared: ${{ steps.build-targets.outputs.shared }}
      build_mn_js: ${{ steps.build-targets.outputs.midnight-js }}
      build_t_js: ${{ steps.build-targets.outputs.testkit-js }}

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # ratchet:actions/setup-node@v4
        with:
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Determine Build Targets
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: build-targets
        with:
          filters: |
            shared:
              - '.github/workflows/**'
              - 'yarn.lock'
              - 'package.json'
            midnight-js:
              - 'packages/**'
            testkit-js:
              - 'packages/**'
              - 'testkit-js/**'

  ci-midnightjs:
    needs: ci
    name: Build Midnight.js
    uses: ./.github/workflows/ci-midnight-js.yml
    with:
      should_run: ${{ needs.ci.outputs.build_mn_js == 'true' || needs.ci.outputs.build_shared == 'true' }}
      should_prerelease: ${{
          github.event_name != 'schedule' &&
          (github.ref_name == 'main' || contains(github.event.head_commit.message, '[do_publish]') || github.event_name == 'workflow_dispatch')
        }}
    secrets: inherit

  ci-testkit:
    needs: ci
    name: Build Testkit.js
    with:
      should_run: ${{ needs.ci.outputs.build_t_js == 'true' || needs.ci.outputs.build_shared == 'true' }}
      should_prerelease: ${{
          github.event_name != 'schedule' &&
          (github.ref_name == 'main' || contains(github.event.head_commit.message, '[do_publish]') || github.event_name == 'workflow_dispatch')
        }}
      network: undeployed
      allure_upload: true
      allure_project_id: midnight-js-main
    uses: ./.github/workflows/ci-testkit-js.yml
    secrets: inherit
